<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - FastAPI Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard">
        <div class="navbar">
            <div class="container">
                <a href="/dashboard" class="navbar-brand">Dashboard</a>
                <ul class="navbar-nav">
                    <li><a href="/dashboard">仪表盘</a></li>
                    <li><a href="/users">用户管理</a></li>
                    <li><a href="/profile" class="active">个人资料</a></li>
                    <li><a href="#" id="logout-btn">退出登录</a></li>
                </ul>
            </div>
        </div>
        
        <div class="container">
            <div class="profile-container">
                <div class="profile-card">
                    <h2>个人资料</h2>
                    <div id="message-area"></div>
                    
                    <div class="profile-avatar" id="avatar">?</div>
                    
                    <form id="profile-form">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" name="username" readonly>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="full_name">姓名</label>
                            <input type="text" id="full_name" name="full_name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">新密码（留空则不修改）</label>
                            <input type="password" id="password" name="password" placeholder="请输入新密码">
                        </div>
                        
                        <button type="submit" class="btn btn-primary">更新资料</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
    <script>
        async function loadProfile() {
            const profile = await getUserProfile();
            if (!profile) {
                window.location.href = '/login';
                return;
            }
            
            document.getElementById('username').value = profile.username;
            document.getElementById('email').value = profile.email;
            document.getElementById('full_name').value = profile.full_name;
            document.getElementById('avatar').textContent = profile.username.charAt(0).toUpperCase();
        }
        
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const full_name = document.getElementById('full_name').value;
            const password = document.getElementById('password').value;
            
            const result = await updateProfile(full_name, email, password);
            
            const messageArea = document.getElementById('message-area');
            messageArea.innerHTML = '';
            
            if (result.success) {
                const successDiv = document.createElement('div');
                successDiv.className = 'success-message';
                successDiv.textContent = '资料更新成功！';
                messageArea.appendChild(successDiv);
                
                document.getElementById('password').value = '';
            } else {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = result.message;
                messageArea.appendChild(errorDiv);
            }
        });
        
        loadProfile();
    </script>
</body>
</html>
