<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - FastAPI Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <h2>创建账号</h2>
            <div id="message-area"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required placeholder="请输入邮箱">
                </div>
                
                <div class="form-group">
                    <label for="full_name">姓名</label>
                    <input type="text" id="full_name" name="full_name" placeholder="请输入姓名（可选）">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码">
                </div>
                
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
            
            <div class="links">
                <p>已有账号？<a href="/login">立即登录</a></p>
            </div>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const full_name = document.getElementById('full_name').value;
            const password = document.getElementById('password').value;
            
            const result = await register(username, email, password, full_name);
            
            const messageArea = document.getElementById('message-area');
            messageArea.innerHTML = '';
            
            if (result.success) {
                const successDiv = document.createElement('div');
                successDiv.className = 'success-message';
                successDiv.textContent = '注册成功！请登录';
                messageArea.appendChild(successDiv);
                
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = result.message;
                messageArea.appendChild(errorDiv);
            }
        });
    </script>
</body>
</html>
